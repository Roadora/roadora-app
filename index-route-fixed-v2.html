<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadora Routeplanner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#f7f3ec;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e7dfd3;--accent:#166534;--soft:#efe8dc;--dark:#111827}
*{box-sizing:border-box}body{margin:0;padding-bottom:110px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1160px;margin:auto;padding:18px}.hero{min-height:330px;border-radius:32px;padding:28px;background:linear-gradient(135deg,rgba(17,24,39,.72),rgba(15,118,110,.45)),url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');background-size:cover;background-position:center;color:#fff;display:flex;align-items:flex-end;box-shadow:0 16px 42px rgba(0,0,0,.12)}
.pill{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:8px 12px;font-size:13px}h1{font-size:clamp(38px,7vw,68px);line-height:.95;margin:12px 0}h2{margin:0 0 14px;font-size:24px}.hero p{color:#f3f4f6;font-size:18px}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.04)}.section{margin-top:18px}
input,select{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px;font:inherit;background:#fff}button{border:0;border-radius:15px;padding:13px 16px;background:var(--dark);color:#fff;font-weight:800;cursor:pointer}button.secondary{background:var(--soft);color:var(--text);border:1px solid var(--line)}button.accent{background:var(--accent)}
.route-search{display:grid;grid-template-columns:1fr 1fr;gap:12px}.smart-options{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.summary{grid-column:1/-1;background:#f8f5ef;color:var(--accent);border:1px solid var(--line);border-radius:16px;padding:12px;font-weight:800;display:none}.layout{display:grid;grid-template-columns:1.45fr .9fr;gap:16px}#map{height:580px;border-radius:26px;overflow:hidden;border:1px solid var(--line);background:#e5e7eb}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{background:#f8f5ef;color:var(--accent);padding:12px;border-radius:16px;font-weight:900;border:1px solid var(--line)}.filters{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.filter{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 13px;font-weight:800;display:flex;align-items:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.04);cursor:pointer}.filter input{width:18px;height:18px;accent-color:var(--accent)}.filter:has(input:checked){border-color:var(--accent);background:#f0fdf4;color:var(--accent)}
.stop{background:#fff;border:1px solid var(--line);padding:12px;border-radius:18px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}.stop input{width:auto;margin-top:4px}.stop h3{margin:0 0 4px;font-size:15px}.stop p{margin:0;color:var(--muted);font-size:13px}.badge{display:inline-block;background:#f3f4f6;color:var(--text);padding:5px 8px;border-radius:999px;font-size:12px;font-weight:800;margin-top:7px}.notice{background:#fff7ed;border-left:5px solid #f97316;border-radius:16px;padding:13px;color:#7c2d12;margin-top:14px}.loading{display:none;background:#ecfeff;border-left:5px solid #0f766e;border-radius:16px;padding:13px;color:#115e59;margin-bottom:12px;font-weight:800}
.bottom{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(1120px,calc(100% - 24px));background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:24px;box-shadow:0 12px 34px rgba(0,0,0,.14);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;z-index:9999}.bottom button{background:transparent;color:var(--text);border:0;border-radius:16px;padding:8px 6px;font-size:13px}.bottom button.active{background:var(--accent);color:white}.nav-icon{display:block;font-size:22px;margin-bottom:4px}
@media(max-width:900px){.route-search,.layout{grid-template-columns:1fr}.smart-options{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,1fr)}#map{height:430px}}@media(max-width:430px){.filters{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<section class="hero"><div><span class="pill">🚗 Roadora Routeplanner</span><h1>Plan je perfecte roadtrip door Europa</h1><p>Maak een route, vind stops onderweg en open je selectie in Google Maps.</p></div></section>
<section class="card section"><h2>🗺️ Slimme route maken</h2><div class="route-search">
<div style="display:grid;grid-template-columns:1fr auto;gap:8px"><input id="from" value="Rotterdam" placeholder="Vertrekpunt" oninput="document.getElementById('fromCoords').value=''"><button type="button" class="secondary" onclick="useGpsStart()">📍</button></div>
<input type="hidden" id="fromCoords" value=""><input id="to" value="Amsterdam" placeholder="Bestemming">
<div class="smart-options"><select id="pace" onchange="routeAdvice();autoSelectStops()"><option value="rustig">Rustig reizen</option><option value="normaal" selected>Normaal tempo</option><option value="snel">Zo snel mogelijk</option></select><select id="nights" onchange="routeAdvice();autoSelectStops()"><option value="0">Geen overnachting</option><option value="1" selected>1 overnachting</option><option value="2">2 overnachtingen</option><option value="3">3 overnachtingen</option><option value="4">4+ overnachtingen</option></select><select id="stopCount" onchange="routeAdvice();autoSelectStops()"><option value="0">Geen tussenstops</option><option value="1">1 tussenstop</option><option value="2">2 tussenstops</option><option value="3" selected>3 tussenstops</option><option value="4">4 tussenstops</option><option value="5">5 tussenstops</option></select><select id="radius" onchange="findStopsAlongRoute()"><option value="5">Zoek binnen 5 km</option><option value="10" selected>Zoek binnen 10 km</option><option value="15">Zoek binnen 15 km</option><option value="25">Zoek binnen 25 km</option><option value="50">Zoek binnen 50 km</option></select></div>
<button class="accent" onclick="planRoute()" style="grid-column:1/-1">Plan route</button><div id="gpsStatus" style="grid-column:1/-1;color:#6b7280"></div><div id="resolvedRoute" style="grid-column:1/-1;color:#6b7280;font-weight:800"></div><div id="summary" class="summary"></div><button type="button" class="secondary" onclick="applyAdvice()" style="grid-column:1/-1">Gebruik advies voor overnachtingen</button></div></section>
<section class="layout section"><div class="card"><div id="map"></div></div><div class="card"><h2>Route & stops</h2><div id="loading" class="loading">Route en stops worden gezocht...</div><div class="stats"><div class="stat">Afstand<br><span id="distance">-</span></div><div class="stat">Reistijd<br><span id="duration">-</span></div><div class="stat">Stops<br><span id="count">0</span></div></div>
<div class="filters"><label class="filter"><input type="checkbox" value="fuel" checked onchange="findStopsAlongRoute()"> ⛽ Tankstations</label><label class="filter"><input type="checkbox" value="charging_station" onchange="findStopsAlongRoute()"> ⚡ Laadpalen</label><label class="filter"><input type="checkbox" value="hotel" checked onchange="findStopsAlongRoute()"> 🏨 Hotels</label><label class="filter"><input type="checkbox" value="attraction" onchange="findStopsAlongRoute()"> 🎢 Uitjes</label><label class="filter"><input type="checkbox" value="parking" onchange="findStopsAlongRoute()"> 🅿️ Parkeren</label><label class="filter"><input type="checkbox" value="restaurant" onchange="findStopsAlongRoute()"> 🍽️ Restaurants</label><label class="filter"><input type="checkbox" value="supermarket" onchange="findStopsAlongRoute()"> 🛒 Supermarkt</label><label class="filter"><input type="checkbox" value="toilets" onchange="findStopsAlongRoute()"> 🚻 Toiletten</label></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><button class="secondary" onclick="selectCoreFilters()">Basis onderweg</button><button class="secondary" onclick="selectComfortFilters()">Comfort stops</button></div><button class="secondary" onclick="autoSelectStops()">Selecteer aanbevolen stops</button><button id="mapsNavBtn" class="accent" onclick="openGoogleMaps()" style="width:100%;margin-top:10px">Open route in Google Maps</button><h2 style="margin-top:18px">Gevonden langs route</h2><div id="stops"></div></div></section>
</main>
<nav class="bottom"><button><span class="nav-icon">🏨</span>Hotels</button><button class="active"><span class="nav-icon">🚗</span>Route</button><button><span class="nav-icon">💶</span>Vergelijk</button><button><span class="nav-icon">⛽</span>Onderweg</button><button><span class="nav-icon">🎡</span>Uitjes</button></nav>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BACKEND_URL=location.hostname.includes("vercel.app")?"/api/maps-search":"https://project-uxgks.vercel.app/api/maps-search";
let map,routeLine,startMarker,endMarker,routeCoords=[],stopMarkers=[],allStops=[];
function initMap(){if(map)return;map=L.map("map").setView([52.1,5.1],7);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map)}
function setLoading(on){document.getElementById("loading").style.display=on?"block":"none"}function selectedTypes(){return Array.from(document.querySelectorAll(".filter input:checked")).map(x=>x.value)}
function typeToQuery(t){return{fuel:"tankstation",charging_station:"laadpaal",hotel:"hotel",attraction:"bezienswaardigheid",parking:"parking",restaurant:"restaurant",supermarket:"supermarkt",toilets:"toilet"}[t]||t}
function typeIcon(t){return{fuel:"⛽",charging_station:"⚡",hotel:"🏨",attraction:"🎢",parking:"🅿️",restaurant:"🍽️",supermarket:"🛒",toilets:"🚻"}[t]||"📍"}
function typeLabel(t){return{fuel:"tankstation",charging_station:"laadpaal",hotel:"hotel",attraction:"uitje",parking:"parkeren",restaurant:"restaurant",supermarket:"supermarkt",toilets:"toilet"}[t]||"stop"}
function distanceKm(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function sampleRoutePoints(){if(!routeCoords.length)return[];let pts=[],max=Math.min(7,routeCoords.length);for(let i=0;i<max;i++){let idx=Math.floor((i/(max-1||1))*(routeCoords.length-1));pts.push({lat:routeCoords[idx][0],lng:routeCoords[idx][1]})}return pts}
function nearestDistanceToRoute(stop){let min=999999;sampleRoutePoints().forEach(p=>{let d=distanceKm(stop,p);if(d<min)min=d});return min}
async function geocodePlace(place){let o=(place||"").trim(),m=o.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);if(m)return{lat:+m[1],lng:+m[2],label:"Huidige locatie"};let q=o,nl=["rotterdam","amsterdam","utrecht","den haag","eindhoven","breda","tilburg","groningen","maastricht","arnhem","nijmegen","haarlem","leiden","delft","zwolle","leeuwarden","alkmaar"];if(nl.includes(q.toLowerCase())&&!q.includes(","))q+=", Nederland";let res=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q)),data=await res.json();if(!data.length)throw Error("Plaats niet gevonden: "+o);return{lat:+data[0].lat,lng:+data[0].lon,label:data[0].display_name}}
async function reverseGeocode(lat,lng){try{let res=await fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&zoom=10&addressdetails=1"),data=await res.json(),a=data.address||{};return a.city||a.town||a.village||a.municipality||a.county||"Huidige locatie"}catch(e){return"Huidige locatie"}}
async function planRoute(){initMap();setLoading(true);document.getElementById("stops").innerHTML="";document.getElementById("count").textContent="0";allStops=[];try{clearStops();if(routeLine)map.removeLayer(routeLine);if(startMarker)map.removeLayer(startMarker);if(endMarker)map.removeLayer(endMarker);let fromText=document.getElementById("from").value.trim()||"Rotterdam",fromCoords=document.getElementById("fromCoords").value.trim(),toText=document.getElementById("to").value.trim()||"Amsterdam";let from=await geocodePlace(fromCoords||fromText),to=await geocodePlace(toText);let url="https://router.project-osrm.org/route/v1/driving/"+from.lng+","+from.lat+";"+to.lng+","+to.lat+"?overview=full&geometries=geojson";let rd=await (await fetch(url)).json();if(!rd.routes||!rd.routes.length)throw Error("Geen route gevonden");let route=rd.routes[0];routeCoords=route.geometry.coordinates.map(c=>[c[1],c[0]]);routeLine=L.polyline(routeCoords,{color:"#166534",weight:6,opacity:.9}).addTo(map);startMarker=L.marker([from.lat,from.lng]).addTo(map).bindPopup("<b>Vertrekpunt</b><br>"+fromText);endMarker=L.marker([to.lat,to.lng]).addTo(map).bindPopup("<b>Bestemming</b><br>"+toText);map.fitBounds(routeLine.getBounds(),{padding:[35,35]});document.getElementById("distance").textContent=Math.round(route.distance/1000)+" km";let h=Math.floor(route.duration/3600),m=Math.round((route.duration%3600)/60);document.getElementById("duration").textContent=h+"u "+m+"m";document.getElementById("resolvedRoute").textContent="Route: "+fromText+" → "+toText;routeAdvice();await findStopsAlongRoute()}catch(e){document.getElementById("stops").innerHTML='<div class="notice">Route kon niet worden geladen: '+e.message+"</div>";console.error(e)}finally{setLoading(false)}}
async function searchBackend(query,point,zoom){let url=BACKEND_URL+"?q="+encodeURIComponent(query)+"&lat="+encodeURIComponent(point.lat)+"&lng="+encodeURIComponent(point.lng)+"&zoom="+encodeURIComponent(zoom||14);let res=await fetch(url);if(!res.ok)throw Error("Backend fout: "+res.status);let data=await res.json();return data.results||[]}
async function findStopsAlongRoute(){if(!routeCoords.length)return;setLoading(true);clearStops();let types=selectedTypes(),base=+document.getElementById("radius").value||10,tries=[...new Set([base,25,50])].filter(x=>x>=base),points=sampleRoutePoints();try{let found=[];for(let radius of tries){found=[];let zoom=radius<=10?14:radius<=25?12:11,seen=new Set();for(let point of points){for(let type of types){let results=await searchBackend(typeToQuery(type),point,zoom);results.forEach(item=>{let lat=+item.lat,lng=+item.lng;if(!lat||!lng)return;let stop={type,name:item.name||typeToQuery(type),address:item.address||"",rating:item.rating,lat,lng,routeDistance:nearestDistanceToRoute({lat,lng}),link:item.link||null};let key=(stop.name+"_"+stop.lat+"_"+stop.lng).toLowerCase();if(seen.has(key))return;seen.add(key);if(stop.routeDistance<=radius)found.push(stop)})}}if(found.length){if(radius!==base)document.getElementById("radius").value=String(radius);break}}allStops=found.sort((a,b)=>a.routeDistance-b.routeDistance).slice(0,120);renderStops();autoSelectStops()}catch(e){document.getElementById("stops").innerHTML='<div class="notice">Stops konden niet worden geladen: '+e.message+"</div>";console.error(e)}finally{setLoading(false)}}
function renderStops(){clearStops();let radius=+document.getElementById("radius").value||10,visible=allStops.filter(s=>s.routeDistance<=radius);document.getElementById("count").textContent=visible.length;if(!visible.length){document.getElementById("stops").innerHTML='<div class="notice">Geen stops gevonden. Kies ruimere zoekafstand of andere filters.</div>';return}document.getElementById("stops").innerHTML=visible.map(s=>`<label class="stop"><input type="checkbox" class="stopCheck" data-lat="${s.lat}" data-lng="${s.lng}" data-name="${String(s.name).replace(/"/g,'')}" onchange="updateSelected()"><div><h3>${typeIcon(s.type)} ${s.name}</h3><p>${Math.round(s.routeDistance*10)/10} km van je route${s.rating?" • ⭐ "+s.rating:""}</p><span class="badge">${typeLabel(s.type)}</span></div></label>`).join("");visible.slice(0,70).forEach(s=>{let marker=L.marker([s.lat,s.lng]).addTo(map);marker.bindPopup("<b>"+typeIcon(s.type)+" "+s.name+"</b><br>"+Math.round(s.routeDistance*10)/10+" km van route");stopMarkers.push(marker)});updateSelected()}
function clearStops(){stopMarkers.forEach(m=>map.removeLayer(m));stopMarkers=[]}function updateSelected(){
  let selected=document.querySelectorAll(".stopCheck:checked").length,total=document.querySelectorAll(".stopCheck").length;
  document.getElementById("count").textContent=selected?selected+" gekozen":total;
  const btn=document.getElementById("mapsNavBtn");
  if(btn){
    btn.textContent=selected>0 ? "Navigeer in Maps" : "Open route in Google Maps";
  }
}
function routeAdvice(){let km=parseInt((document.getElementById("distance").textContent||"0").replace(/\D/g,""))||0,pace=document.getElementById("pace").value,nights=+document.getElementById("nights").value,stops=+document.getElementById("stopCount").value,max=pace==="rustig"?350:pace==="snel"?800:550,advised=Math.max(0,Math.ceil(km/max)-1),box=document.getElementById("summary");box.style.display="block";box.innerHTML=nights<advised?"⚠️ Deze route is ongeveer <b>"+km+" km</b>. Advies: <b>"+advised+" overnachting(en)</b>.":"✅ Route ongeveer <b>"+km+" km</b>. Je kiest "+nights+" overnachting(en) en "+stops+" tussenstop(s)."}
function applyAdvice(){let km=parseInt((document.getElementById("distance").textContent||"0").replace(/\D/g,""))||0,pace=document.getElementById("pace").value,max=pace==="rustig"?350:pace==="snel"?800:550,advised=Math.max(0,Math.ceil(km/max)-1);document.getElementById("nights").value=String(Math.min(advised,4));if(km>300&&document.getElementById("stopCount").value==="0")document.getElementById("stopCount").value="3";routeAdvice();autoSelectStops()}
function autoSelectStops(){let count=+document.getElementById("stopCount").value,checks=Array.from(document.querySelectorAll(".stopCheck"));checks.forEach(c=>c.checked=false);if(count>0)checks.slice(0,count).forEach(c=>c.checked=true);updateSelected()}
function setFilters(values){document.querySelectorAll(".filter input").forEach(cb=>cb.checked=values.includes(cb.value));findStopsAlongRoute()}function selectCoreFilters(){setFilters(["fuel","charging_station","hotel","parking"])}function selectComfortFilters(){setFilters(["hotel","restaurant","toilets","supermarket","attraction"])}
function openGoogleMaps(){let origin=encodeURIComponent(document.getElementById("fromCoords").value||document.getElementById("from").value||"Rotterdam"),dest=encodeURIComponent(document.getElementById("to").value||"Amsterdam"),selected=Array.from(document.querySelectorAll(".stopCheck:checked")).slice(0,8).map(c=>encodeURIComponent(c.dataset.lat+","+c.dataset.lng));let url="https://www.google.com/maps/dir/?api=1&origin="+origin+"&destination="+dest+"&travelmode=driving";if(selected.length)url+="&waypoints="+selected.join("|");window.open(url,"_blank")}
function useGpsStart(){let st=document.getElementById("gpsStatus");st.textContent="Locatie ophalen...";if(!navigator.geolocation){st.textContent="GPS wordt niet ondersteund.";return}navigator.geolocation.getCurrentPosition(async pos=>{let lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);document.getElementById("fromCoords").value=lat+","+lng;let name=await reverseGeocode(lat,lng);document.getElementById("from").value=name;st.textContent="Locatie gevonden: "+name+". Je kunt nu de route plannen."},()=>{st.textContent="Locatie kon niet worden opgehaald. Controleer toestemming."},{enableHighAccuracy:true,timeout:12000,maximumAge:60000})}
window.addEventListener("DOMContentLoaded",initMap);
</script>
</body></html>
