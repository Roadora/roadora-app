<script>
// ===== ROADORA V4.3 FINAL CLEAN FIX =====

// 1. Verwijder ALLE dubbele navigatieknoppen
function removeDuplicateNavButtons() {
  // oude navigateBtn
  const oldBtn = document.getElementById("navigateBtn");
  if (oldBtn) oldBtn.remove();

  // knoppen met tekst "Navigeren"
  document.querySelectorAll("button").forEach(btn => {
    if (btn.innerText.toLowerCase().includes("navigeer")) {
      if (btn.id !== "startNavigationBtn") {
        btn.remove();
      }
    }
  });
}

// 2. Zorg dat de hoofdknop goed blijft
function fixMainNavButton() {
  const main = document.getElementById("startNavigationBtn");
  if (!main) return;

  main.style.background = "#166534";
  main.style.color = "#fff";
  main.style.fontWeight = "600";
  main.style.borderRadius = "12px";
}

// 3. Run na load + nog een keer later (zekerheid)
setTimeout(removeDuplicateNavButtons, 300);
setTimeout(removeDuplicateNavButtons, 1000);
setTimeout(fixMainNavButton, 300);

</script>
