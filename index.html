<script>
// ===== ROADORA UX POLISH V3.4 =====

// Toast melding
function showToast(msg) {
  const t = document.createElement("div");
  t.innerText = msg;
  t.style.position = "fixed";
  t.style.bottom = "20px";
  t.style.left = "50%";
  t.style.transform = "translateX(-50%)";
  t.style.background = "#166534";
  t.style.color = "#fff";
  t.style.padding = "12px 18px";
  t.style.borderRadius = "12px";
  t.style.zIndex = "9999";
  t.style.boxShadow = "0 10px 20px rgba(0,0,0,0.2)";
  t.style.fontSize = "14px";
  document.body.appendChild(t);

  setTimeout(() => t.remove(), 2000);
}

// CTA knop verbeteren
function enhanceNavButton() {
  const btn = document.getElementById("startNavigationBtn");
  if (!btn) return;

  btn.style.background = "#166534";
  btn.style.color = "#fff";
  btn.style.fontWeight = "600";
  btn.style.borderRadius = "14px";
  btn.style.padding = "14px 18px";
  btn.style.boxShadow = "0 6px 14px rgba(0,0,0,0.15)";
}

// bestaande navigatie hooken
function hookNavigation() {
  if (!window.startNavigation) return;

  const original = window.startNavigation;

  window.startNavigation = function () {
    original();
    showToast("Google Maps geopend 🚀");
  };
}

// init
setTimeout(() => {
  enhanceNavButton();
  hookNavigation();
}, 500);

</script>
