<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roadora</title>

  <link rel="stylesheet" href="styles.css"/>

  <script>
    window.RoadoraGoogleMapsReady = false;

    async function initRoadoraGoogle() {
      window.RoadoraGoogleMapsReady = true;

      if (window.initRoadoraAutocomplete) {
        window.initRoadoraAutocomplete();
      }
    }
  </script>

  <!-- VERVANG JOUW_API_KEY_HIER -->
  <script
    async
    src="https://maps.googleapis.com/maps/api/js?key=JOUW_API_KEY_HIER&loading=async&libraries=places&callback=initRoadoraGoogle">
  </script>
</head>

<body>

<div class="hero">

  <div class="overlay"></div>

  <div class="hero-content">

    <div class="logo">Roadora</div>

    <div class="route-card">

      <div class="roadora-autocomplete-field">
        <label>Vertrekpunt</label>
        <div id="originAutocomplete"></div>
      </div>

      <div class="roadora-autocomplete-field">
        <label>Bestemming</label>
        <div id="destinationAutocomplete"></div>
      </div>

      <button class="plan-btn" id="planRouteBtn">
        Plan route
      </button>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
