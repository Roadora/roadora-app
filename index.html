<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadora Home Preview</title>
<style>
body{margin:0;font-family:system-ui;background:#f7f3ec;color:#111827}
.wrap{max-width:900px;margin:auto;padding:20px}
.hero{background:#fff;border:1px solid #e7dfd3;border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{font-size:34px;margin:0 0 10px}
p{color:#6b7280;font-size:18px}
.grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-top:18px}
.btn{border:0;border-radius:18px;padding:18px;text-decoration:none;font-weight:800;display:flex;align-items:center;justify-content:center;min-height:72px}
.primary{background:#166534;color:#fff;font-size:20px}
.secondary{background:#fff;color:#111827;border:1px solid #e7dfd3}
.card{margin-top:18px;background:#fff;border:1px solid #e7dfd3;border-radius:20px;padding:18px}
.small{font-size:14px;color:#6b7280}
@media(max-width:700px){.grid{grid-template-columns:1fr}.primary,.secondary{min-height:60px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="small">Roadora Home Concept</div>
    <h1>Plan jouw roadtrip slim door Europa</h1>
    <p>Route eerst, hotels direct beschikbaar als snelle shortcut.</p>
    <div class="grid">
      <a href="#" class="btn primary">🚗 Start route</a>
      <a href="#" class="btn secondary">🏨 Hotels</a>
      <a href="#" class="btn secondary">🎡 Uitjes</a>
    </div>
  </div>
  <div class="card">
    <strong>Waarom dit werkt</strong>
    <p class="small">Je unieke waarde staat centraal: routes, stops, hotels en uitjes in één flow.</p>
  </div>
</div>
</body>
</html>
