/* =========================================================
   ROADORA HERO FADE BLOCKS V2
   Hero blijft intact, maar beige vlak vloeit weer zacht over.
   Blokken blijven netjes in de beige content-flow.
   ========================================================= */

/* Hero krijgt alleen onderaan een lange zachte fade */
.hero{
  position:relative !important;
  z-index:1 !important;
  overflow:hidden !important;
}

.hero::before{
  content:&quot;&quot; !important;
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  bottom:-1px !important;
  height:155px !important;
  z-index:6 !important;
  pointer-events:none !important;

  background:
    linear-gradient(
      to bottom,
      rgba(246,239,230,0) 0%,
      rgba(246,239,230,.05) 24%,
      rgba(246,239,230,.18) 46%,
      rgba(246,239,230,.42) 66%,
      rgba(246,239,230,.74) 84%,
      #f6efe6 100%
    ) !important;
}

/* Donkere onderkant uit de hero halen, zodat de fade warm blijft */
.hero-shade{
  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,.12) 0%,
      rgba(0,0,0,.03) 48%,
      rgba(0,0,0,.01) 78%,
      rgba(0,0,0,0) 100%
    ),
    linear-gradient(
      90deg,
      rgba(0,0,0,.34),
      rgba(0,0,0,.05) 55%,
      rgba(0,0,0,.06)
    ) !important;
}

/* Beige vlak schuift subtiel omhoog in de fade,
   maar niet zo hoog dat auto/weg verdwijnen */
.beige-panel{
  position:relative !important;
  z-index:3 !important;

  margin-top:-44px !important;
  min-height:calc(57vh + 44px) !important;

  padding-top:58px !important;
  padding-left:14px !important;
  padding-right:14px !important;
  padding-bottom:calc(108px + env(safe-area-inset-bottom)) !important;

  border-top-left-radius:0 !important;
  border-top-right-radius:0 !important;
  box-shadow:none !important;
  overflow:visible !important;

  background:
    linear-gradient(
      to bottom,
      rgba(246,239,230,0) 0px,
      rgba(246,239,230,.18) 22px,
      rgba(246,239,230,.46) 48px,
      rgba(246,239,230,.78) 76px,
      #f6efe6 104px,
      #f2e8dc 100%
    ) !important;
}

/* Extra zachte overlap achter de bovenkant van de content */
.beige-panel::before{
  content:&quot;&quot; !important;
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  top:-64px !important;
  height:130px !important;
  z-index:-1 !important;
  pointer-events:none !important;

  background:
    linear-gradient(
      to bottom,
      rgba(246,239,230,0) 0%,
      rgba(246,239,230,.14) 28%,
      rgba(246,239,230,.42) 58%,
      rgba(246,239,230,.78) 84%,
      #f6efe6 100%
    ) !important;
}

/* Content staat niet meer als losse plaat direct tegen de hero,
   maar zweeft rustig in de fade/achtergrond */
.content-stack{
  position:relative !important;
  z-index:10 !important;
  margin-top:0 !important;
  gap:10px !important;
}

/* Cards iets zachter zodat ze meer in de achtergrond vallen,
   zonder de hero te bedekken */
.surface-card{
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.66),
      rgba(255,255,255,.44)
    ) !important;

  border:1px solid rgba(92,66,42,.065) !important;

  box-shadow:
    0 10px 26px rgba(48,34,22,.052),
    inset 0 1px 0 rgba(255,255,255,.76) !important;
}

/* Eerste card mag net iets sterker blijven als hoofdblok */
.roadora-summary-card{
  box-shadow:
    0 14px 32px rgba(48,34,22,.078),
    inset 0 1px 0 rgba(255,255,255,.82) !important;
}

/* Mobiel iets veiliger zodat de hero-compositie zichtbaar blijft */
@media (max-width:390px){
  .beige-panel{
    margin-top:-38px !important;
    padding-top:52px !important;
  }

  .hero::before{
    height:145px !important;
  }
}

/* =========================================================
   ROADORA POSITION CLEAN V8
   Terug naar de goede locked hero/fade basis.
   Fix:
   - geen agressieve fixed viewport
   - geen lege fade-zone
   - overview-card netjes in overgang
   - weg/auto blijven zichtbaar
   ========================================================= */

/* Scroll niet hard forceren; layout blijft natuurlijk en stabiel */
html,
body{
  overflow-x:hidden !important;
}

/* Hero/fade blijft locked zoals v3 */
.hero{
  position:relative !important;
  z-index:1 !important;
  overflow:hidden !important;
}

.hero::before{
  height:172px !important;
}

/* Beige vlak iets onder de hero/fade laten starten */
.beige-panel{
  position:relative !important;
  z-index:3 !important;

  margin-top:-56px !important;
  min-height:calc(57vh + 56px) !important;

  padding-top:50px !important;
  padding-left:14px !important;
  padding-right:14px !important;
  padding-bottom:calc(108px + env(safe-area-inset-bottom)) !important;

  overflow:visible !important;
}

/* Content direct in de overgang, niet pas na een lege zone */
.content-stack{
  position:relative !important;
  z-index:10 !important;

  display:flex !important;
  flex-direction:column !important;
  gap:8px !important;

  margin-top:-18px !important;
}

/* Bovenste blok iets hoger, maar niet afgesneden */
.roadora-summary-card{

  top:-8px !important;
  margin-bottom:-8px !important;
}

/* Volgende blokken volgen strak */

document.addEventListener(&#x27;DOMContentLoaded&#x27;, () =&gt; {

  const dayCards = document.querySelectorAll(&#x27;.day-card&#x27;);
  const overlay = document.getElementById(&#x27;dayDetailOverlay&#x27;);
  const closeBtn = document.getElementById(&#x27;closeDayDetail&#x27;);
  const detailKicker = document.getElementById(&#x27;detailKicker&#x27;);
  const detailTitle = document.getElementById(&#x27;detailTitle&#x27;);
  const detailSub = document.getElementById(&#x27;detailSub&#x27;);
  const routeScroll = document.getElementById(&#x27;dayRouteScroll&#x27;);
  const bekijkDagBtn = document.querySelector(&#x27;.details-btn&#x27;);

  const dayDetails = {
    1: [&#x27;Dag 1&#x27;, &#x27;Rotterdam → Frankfurt&#x27;, &#x27;480 km · 5u 10m · 2 stops onderweg&#x27;],
    2: [&#x27;Dag 2&#x27;, &#x27;Frankfurt → Innsbruck&#x27;, &#x27;460 km · 5u 30m · 2 stops onderweg&#x27;],
    3: [&#x27;Vandaag · Dag 3&#x27;, &#x27;Innsbruck → Gardameer&#x27;, &#x27;320 km · 4u 15m · 2 stops onderweg&#x27;],
    4: [&#x27;Dag 4&#x27;, &#x27;Gardameer → Toscane&#x27;, &#x27;410 km · 5u 20m · 3 stops onderweg&#x27;],
    5: [&#x27;Dag 5&#x27;, &#x27;Toscane → Rome&#x27;, &#x27;280 km · 3u 45m · 1 stop onderweg&#x27;],
    6: [&#x27;Dag 6&#x27;, &#x27;Rome → Amalfi&#x27;, &#x27;275 km · 3u 50m · 2 stops onderweg&#x27;],
    7: [&#x27;Dag 7&#x27;, &#x27;Rustdag Amalfi&#x27;, &#x27;0 km · vrije dag · hotel blijft hetzelfde&#x27;],
    8: [&#x27;Dag 8&#x27;, &#x27;Amalfi → Florence&#x27;, &#x27;520 km · 6u 10m · 3 stops onderweg&#x27;],
    9: [&#x27;Dag 9&#x27;, &#x27;Florence → Zwitserland&#x27;, &#x27;610 km · 7u 05m · 3 stops onderweg&#x27;],
    10: [&#x27;Dag 10&#x27;, &#x27;Zwitserland → Rotterdam&#x27;, &#x27;720 km · 8u 20m · 4 stops onderweg&#x27;]
  };

  function openDayDetail(dayNumber){
    const detail = dayDetails[dayNumber] || dayDetails[3];

    detailKicker.textContent = detail[0];
    detailTitle.textContent = detail[1];
    detailSub.textContent = detail[2];

    overlay.classList.add(&#x27;open&#x27;);
    overlay.setAttribute(&#x27;aria-hidden&#x27;,&#x27;false&#x27;);

    document.body.style.overflow = &#x27;hidden&#x27;;

    if(routeScroll){
      routeScroll.scrollTop = 0;
    }
  }

  function closeDayDetail(){
    overlay.classList.remove(&#x27;open&#x27;);
    overlay.setAttribute(&#x27;aria-hidden&#x27;,&#x27;true&#x27;);
    document.body.style.overflow = &#x27;&#x27;;
  }

  // Dagen scrollcards
  dayCards.forEach((card, index) =&gt; {
    card.addEventListener(&#x27;click&#x27;, () =&gt; {
      openDayDetail(index + 1);
    });
  });

  // Bekijk dag knop -&gt; opent actieve dag
  if(bekijkDagBtn){
    bekijkDagBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      openDayDetail(3);
    });
  }

  if(closeBtn){
    closeBtn.addEventListener(&#x27;click&#x27;, closeDayDetail);
  }

  overlay.addEventListener(&#x27;click&#x27;, (event) =&gt; {
    if(event.target === overlay){
      closeDayDetail();
    }
  });

  document.addEventListener(&#x27;keydown&#x27;, (event) =&gt; {
    if(event.key === &#x27;Escape&#x27;){
      closeDayDetail();
    }
  });
});

/* =========================================================
   ROADORA HERO CONSISTENCY LOCK V1
   Unified hero architecture for all subpages
   ========================================================= */

:root{
  --roadora-hero-height:44vh;
  --roadora-hero-min:350px;
  --roadora-hero-max:430px;

  --roadora-topbar-top:calc(env(safe-area-inset-top) + 14px);

  --roadora-hero-text-top:92px;

  --roadora-fade-height:182px;

  --roadora-radius-xl:28px;
}

/* HERO SYSTEM */
.hero{
  position:relative !important;

  z-index:1 !important;

  height:var(--roadora-hero-height) !important;
  min-height:var(--roadora-hero-min) !important;
  max-height:var(--roadora-hero-max) !important;

  overflow:hidden !important;

  background:#1d261f !important;
}

.hero-img{
  position:absolute !important;
  inset:0 !important;

  width:100% !important;
  height:100% !important;

  object-fit:cover !important;
  object-position:center 74% !important;

  transform:scale(1.02) !important;
}

.hero-shade{
  position:absolute !important;
  inset:0 !important;

  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,.12) 0%,
      rgba(0,0,0,.03) 48%,
      rgba(0,0,0,.01) 78%,
      rgba(0,0,0,0) 100%
    ),
    linear-gradient(
      90deg,
      rgba(0,0,0,.34),
      rgba(0,0,0,.05) 55%,
      rgba(0,0,0,.06)
    ) !important;

  pointer-events:none !important;
}

.hero::before{
  content:&quot;&quot; !important;

  position:absolute !important;
  left:0 !important;
  right:0 !important;
  bottom:-1px !important;

  height:var(--roadora-fade-height) !important;

  z-index:6 !important;

  pointer-events:none !important;

  background:
    linear-gradient(
      to bottom,
      rgba(246,239,230,0) 0%,
      rgba(246,239,230,.05) 24%,
      rgba(246,239,230,.18) 46%,
      rgba(246,239,230,.42) 66%,
      rgba(246,239,230,.74) 84%,
      #f6efe6 100%
    ) !important;
}

/* TOPBAR */
.topbar{
  position:absolute !important;

  z-index:9 !important;

  top:var(--roadora-topbar-top) !important;
  left:16px !important;
  right:16px !important;

  display:flex !important;
  align-items:flex-start !important;
  justify-content:space-between !important;
}

.round-btn{
  width:48px !important;
  height:48px !important;

  border-radius:999px !important;

  display:grid !important;
  place-items:center !important;

  background:rgba(22,28,31,.74) !important;

  color:#fff !important;

  font-size:24px !important;
  font-weight:800 !important;

  box-shadow:
    0 10px 26px rgba(0,0,0,.18) !important;

  backdrop-filter:blur(10px) !important;
  -webkit-backdrop-filter:blur(10px) !important;
}

.brand{
  margin-top:-4px !important;

  color:#fff !important;

  text-align:center !important;

  text-shadow:0 2px 18px rgba(0,0,0,.25) !important;
}

.brand strong{
  display:block !important;

  font-size:38px !important;
  line-height:.8 !important;

  font-weight:900 !important;

  letter-spacing:-2px !important;
}

.brand span{
  display:block !important;

  margin-top:8px !important;

  font-size:11px !important;
  font-weight:900 !important;

  letter-spacing:5px !important;
}

/* HERO CONTENT */
.hero-copy{
  position:absolute !important;

  z-index:9 !important;

  left:18px !important;
  right:18px !important;

  top:var(--roadora-hero-text-top) !important;

  color:#fff !important;

  text-shadow:0 4px 18px rgba(0,0,0,.32) !important;
}

/* PANEL OVERLAY SYSTEM */
.beige-panel{
  position:relative !important;

  z-index:3 !important;

  margin-top:-56px !important;

  min-height:calc(57vh + 56px) !important;

  padding:
    50px
    14px
    calc(112px + env(safe-area-inset-bottom)) !important;

  overflow:visible !important;

  background:
    linear-gradient(
      to bottom,
      rgba(246,239,230,0) 0px,
      rgba(246,239,230,.18) 22px,
      rgba(246,239,230,.46) 48px,
      rgba(246,239,230,.78) 76px,
      #f6efe6 104px,
      #f2e8dc 100%
    ) !important;
}

/* MOBILE LOCK */
